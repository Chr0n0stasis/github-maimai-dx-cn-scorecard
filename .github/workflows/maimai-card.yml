name: Update Maimai Card

on:
  schedule:
    # 每6小时更新一次
    - cron: '0 */6 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - main
    paths:
      - '.github/workflows/maimai-card.yml'

permissions:
  contents: write

jobs:
  update-card:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Generate maimai card
        env:
          LXNS_TOKEN: ${{ secrets.LXNS_TOKEN }}
          LXNS_DEV_TOKEN: ${{ secrets.LXNS_DEV_TOKEN }}
          MAIMAI_QQ: ${{ secrets.MAIMAI_QQ }}
          MAIMAI_FRIEND_CODE: ${{ secrets.MAIMAI_FRIEND_CODE }}
        run: |
          python generate_card.py --output maimai-card.svg
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add maimai-card.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "🎮 Update maimai profile card" && git push)
